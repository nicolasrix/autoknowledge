services:
  # ── Embedding service (Ollama + ROCm for AMD GPUs) ───────────────────────────
  embeddings:
    build:
      context: .
      dockerfile: services/embeddings/Dockerfile
    environment:
      # Change model here to switch embedding models (must also update config.toml).
      EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
      OLLAMA_MODELS: /models
    volumes:
      # Persist downloaded model weights across container restarts
      - embeddings_models:/models
    # AMD GPU access (ROCm). Remove these two lines for CPU-only or NVIDIA.
    devices:
      - /dev/kfd
      - /dev/dri
    # No host port needed — autoknowledge reaches Ollama via the Docker network.
    # Uncomment to also call the Ollama API from the host:
    # ports:
    #   - "11434:11434"
    restart: unless-stopped
    healthcheck:
      # Passes only once Ollama is up AND the embedding model responds.
      test: ["CMD-SHELL",
             "curl -sf -X POST http://localhost:11434/v1/embeddings \
              -H 'Content-Type: application/json' \
              -d '{\"model\":\"'\"${EMBEDDING_MODEL:-nomic-embed-text}\"'\",\"input\":\"ping\"}' \
              > /dev/null"]
      interval: 30s
      timeout: 15s
      start_period: 300s   # first start downloads ~274 MB; subsequent starts are fast
      retries: 5

  # ── autoknowledge app ─────────────────────────────────────────────────────────
  autoknowledge:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Vault mount — defined in the volumes section below.
      # Use vault_smb for a TrueNAS/Samba share, vault_local for a local path.
      - ${VAULT_VOLUME:-vault_smb}:/vault:ro
      - autoknowledge_data:/data
    environment:
      AUTOKNOWLEDGE_VAULT_PATH: /vault
      AUTOKNOWLEDGE_DATA_DIR: /data
      AUTOKNOWLEDGE_EMBEDDING_BASE_URL: http://embeddings:11434
      AUTOKNOWLEDGE_EMBEDDING_MODEL: "${EMBEDDING_MODEL:-nomic-embed-text}"
    depends_on:
      embeddings:
        condition: service_healthy
    # Default: SSE transport for the compose stack.
    # Use stdio for direct Claude Code integration (see README).
    command: ["serve", "--transport", "sse", "--host", "0.0.0.0", "--port", "8080"]
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  # ── SMB/CIFS vault (TrueNAS, Samba) ─────────────────────────────────────────
  # Requires cifs-utils on the Docker host (pacman -S cifs-utils / apt install cifs-utils).
  # Set SMB_HOST, SMB_USER, SMB_PASSWORD, SMB_SHARE_PATH in .env.
  vault_smb:
    driver: local
    driver_opts:
      type: cifs
      o: "vers=3.0,username=${SMB_USER:-guest},password=${SMB_PASSWORD:-},ro,iocharset=utf8,noperm"
      device: "//${SMB_HOST:-truenas.local}/${SMB_SHARE_PATH:-Vault}"

  # ── Local path vault ──────────────────────────────────────────────────────────
  # Set VAULT_PATH in .env and switch VAULT_VOLUME=vault_local.
  vault_local:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${VAULT_PATH:-/tmp/vault-placeholder}

  embeddings_models:
  autoknowledge_data:
